<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Bot</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Support Bot</h1>
            <p class="subtitle">AI-powered customer support</p>
        </header>
        <div class="chat-area" id="chatArea">
            <div class="message bot-message">
                <div class="bubble">Hello! I'm your AI support assistant. How can I help you today?</div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your question..." autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
